<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scopri il tuo schema relazionale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-slideIn {
            animation: slideIn 0.6s ease-out;
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        .twinkle {
            animation: twinkle 2s infinite;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        class Quiz {
            constructor() {
                this.currentQuestion = 0;
                this.scores = { affamata: 0, imprigionata: 0, invisibile: 0 };
                this.showResult = false;
                this.email = '';
                this.submitted = false;
                
                this.questions = [
                    {
                        question: "Quando lui scompare per giorni, la PRIMA cosa che fai è:",
                        answers: [
                            { text: "Lo contatti tu, speri che risponda", schema: "affamata" },
                            { text: "Rimani paralizzata, pensi a lui tutto il giorno", schema: "imprigionata" },
                            { text: "Fai finta di niente, ma soffi dentro", schema: "invisibile" }
                        ]
                    },
                    {
                        question: "Se ti promette di cambiare ma non cambia, tu:",
                        answers: [
                            { text: "Gli dai sempre un'altra chance, ha bisogno di tempo", schema: "affamata" },
                            { text: "Non riesci a mollarlo, pensi che prima o poi capirà", schema: "imprigionata" },
                            { text: "Accetti così com'è, non ti meriti di più", schema: "invisibile" }
                        ]
                    },
                    {
                        question: "Un red flag che IGNORI sempre è:",
                        answers: [
                            { text: "Mi fa sentire meno sola anche se mi fa male", schema: "affamata" },
                            { text: "Non riesco a staccarmi mentalmente", schema: "imprigionata" },
                            { text: "Penso di non avere scelta", schema: "invisibile" }
                        ]
                    },
                    {
                        question: "Dopo una rottura, tu:",
                        answers: [
                            { text: "Speri che torni, rimani disponibile per lui", schema: "affamata" },
                            { text: "Non riesci a proseguire, revivi ogni momento assieme", schema: "imprigionata" },
                            { text: "Pensi che tanto non ero importante, serve a niente", schema: "invisibile" }
                        ]
                    },
                    {
                        question: "Gli uomini che attiri sono:",
                        answers: [
                            { text: "Affascinanti ma disconnessi, mi tengono in sospeso", schema: "affamata" },
                            { text: "Non disponibili emotivamente, ma non riesco a lasciarli", schema: "imprigionata" },
                            { text: "Che non mi vedono, e io nemmeno mi vedo", schema: "invisibile" }
                        ]
                    },
                    {
                        question: "Quando lui non ti scrive, pensi:",
                        answers: [
                            { text: "Che faccio? Come faccio a richiamare la sua attenzione?", schema: "affamata" },
                            { text: "Che ho rovinato tutto, mi tormento", schema: "imprigionata" },
                            { text: "Che era scontato, non mi ama comunque", schema: "invisibile" }
                        ]
                    },
                    {
                        question: "La tua autostima nelle relazioni è:",
                        answers: [
                            { text: "Dipende da lui e da quanto mi scrive", schema: "affamata" },
                            { text: "Crolla quando lo perdo, come se fossi nulla senza lui", schema: "imprigionata" },
                            { text: "Non ho mai creduto di meritarmi qualcosa di buono", schema: "invisibile" }
                        ]
                    }
                ];

                this.schemas = {
                    affamata: {
                        name: "LA AFFAMATA 🌙",
                        description: "Rimani agganciata alle briciole, aspetti sempre il suo prossimo messaggio."
                    },
                    imprigionata: {
                        name: "L'IMPRIGIONATA 🕊️",
                        description: "Non riesci a lasciar andare, rimani mentalmente legata anche dopo la rottura."
                    },
                    invisibile: {
                        name: "L'INVISIBILE 💫",
                        description: "Attrai uomini non disponibili perché non ti vedi nemmeno tu."
                    }
                };

                this.render();
            }

            getWinningSchema() {
                const { affamata, imprigionata, invisibile } = this.scores;
                if (affamata >= imprigionata && affamata >= invisibile) return 'affamata';
                if (imprigionata >= invisibile) return 'imprigionata';
                return 'invisibile';
            }

            handleAnswer(schema) {
                this.scores[schema]++;
                if (this.currentQuestion < this.questions.length - 1) {
                    this.currentQuestion++;
                } else {
                    this.showResult = true;
                }
                this.render();
            }

            async handleEmailSubmit(e) {
                e.preventDefault();
                if (!this.email) return;

                try {
                    const winningSchema = this.getWinningSchema();
                    const response = await fetch('https://api.brevo.com/v3/contacts', {
                        method: 'POST',
                        headers: { 
                            'api-key': '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',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            email: this.email,
                            listIds: [3],
                            attributes: {
                                SCHEMA: winningSchema
                            }
                        })
                    });
                    this.submitted = true;
                    this.render();
                } catch (err) {
                    console.error('Errore:', err);
                    this.submitted = true;
                    this.render();
                }
            }

            render() {
                const app = document.getElementById('app');
                
                if (this.currentQuestion === 0 && !this.showResult) {
                    app.innerHTML = `
                        <div class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 flex items-center justify-center p-4">
                            <div class="text-center max-w-2xl animate-slideIn">
                                <div class="mb-8 text-6xl animate-float">✨</div>
                                <h1 class="text-5xl md:text-6xl font-bold text-white mb-4">Quale schema relazionale hai?</h1>
                                <p class="text-xl text-purple-100 mb-8">Scopri perché ripeti sempre lo stesso pattern con uomini non disponibili</p>
                                <div class="bg-white/10 backdrop-blur-md rounded-2xl p-8 mb-8 border border-white/20">
                                    <p class="text-purple-100 mb-6">Questo quiz di 2 minuti ti rivela il tuo schema relazionale ricorrente</p>
                                    <p class="text-sm text-purple-200">✨ Risposte oneste, risultati chiari ✨</p>
                                </div>
                                <button onclick="quiz.currentQuestion = 1; quiz.render()" class="px-8 py-4 bg-gradient-to-r from-rose-400 to-pink-400 text-white font-semibold rounded-full hover:shadow-2xl transition-all text-lg">
                                    Inizia il quiz
                                </button>
                            </div>
                        </div>
                    `;
                } else if (this.currentQuestion > 0 && !this.showResult) {
                    const question = this.questions[this.currentQuestion - 1];
                    const progressPercent = (this.currentQuestion / this.questions.length) * 100;
                    
                    let answersHTML = '';
                    question.answers.forEach((answer, idx) => {
                        answersHTML += `
                            <button onclick="quiz.handleAnswer('${answer.schema}')" class="w-full text-left p-5 rounded-xl bg-white/5 hover:bg-white/15 border border-white/10 hover:border-pink-400/50 transition-all">
                                <p class="text-white hover:text-pink-200 font-medium">${answer.text}</p>
                            </button>
                        `;
                    });

                    app.innerHTML = `
                        <div class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 flex items-center justify-center p-4">
                            <div class="max-w-2xl w-full animate-slideIn">
                                <div class="mb-8">
                                    <div class="flex justify-between items-center mb-3">
                                        <span class="text-purple-200 text-sm">Domanda ${this.currentQuestion} di ${this.questions.length}</span>
                                        <span class="text-purple-200 text-sm">${Math.round(progressPercent)}%</span>
                                    </div>
                                    <div class="w-full bg-white/10 rounded-full h-2">
                                        <div class="bg-gradient-to-r from-rose-400 to-pink-400 h-2 rounded-full transition-all" style="width: ${progressPercent}%"></div>
                                    </div>
                                </div>
                                <div class="bg-white/10 backdrop-blur-md rounded-3xl p-8 border border-white/20">
                                    <h2 class="text-2xl md:text-3xl font-bold text-white mb-8">${question.question}</h2>
                                    <div class="space-y-4">${answersHTML}</div>
                                </div>
                            </div>
                        </div>
                    `;
                } else if (this.showResult && !this.submitted) {
                    const winningSchema = this.getWinningSchema();
                    const result = this.schemas[winningSchema];
                    const teasers = {
                        affamata: "Controlli il telefono aspettando il suo messaggio. Mentre lui fa tutt'altro.",
                        imprigionata: "Mesi dopo la rottura, ancora pensi a lui. Controlli il suo profilo sperando che cambi.",
                        invisibile: "Attrai sempre uomini che non ti scelgono. E tu accetti così com'è."
                    };

                    app.innerHTML = `
                        <div class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 flex items-center justify-center p-4">
                            <div class="max-w-2xl w-full animate-slideIn">
                                <div class="bg-gradient-to-br from-rose-300 to-pink-200 rounded-3xl p-10 shadow-2xl border border-white/20 mb-6">
                                    <div class="text-center">
                                        <div class="text-4xl mb-4">🌙</div>
                                        <h2 class="text-4xl font-bold text-gray-900 mb-2">${result.name}</h2>
                                        <p class="text-base text-gray-700 italic">${result.description}</p>
                                    </div>
                                </div>

                                <div class="bg-white/10 backdrop-blur-md rounded-3xl p-8 border border-white/20 mb-6">
                                    <div class="text-center">
                                        <p class="text-2xl font-bold text-white mb-6">${teasers[winningSchema]}</p>
                                        <p class="text-purple-200 text-lg font-semibold">Ci sono risposte concrete a queste domande.</p>
                                        <p class="text-rose-300 font-bold text-lg mt-2">E cambiano tutto.</p>
                                    </div>
                                </div>

                                <div class="bg-gradient-to-br from-rose-400/20 to-pink-400/20 backdrop-blur-md rounded-3xl p-8 border border-rose-300/30">
                                    <form onsubmit="event.preventDefault(); quiz.handleEmailSubmit(event)">
                                        <h3 class="text-2xl font-bold text-white text-center mb-4">🔓 Sblocca la diagnosi completa</h3>
                                        <p class="text-rose-200 text-center font-semibold mb-2">Ricevi subito:</p>
                                        <ul class="text-rose-100 space-y-2 text-center mb-6 text-sm">
                                            <li>📊 La diagnosi COMPLETA personalizzata</li>
                                            <li>💪 5 aree su cui lavorare davvero</li>
                                            <li>⚡ L'esercizio pratico (quello che trasforma)</li>
                                            <li>🎯 Perché ripeti questo schema</li>
                                            <li>💛 Accesso anticipato alla comunità</li>
                                        </ul>
                                        <input type="email" id="emailInput" placeholder="Metti qui la tua email" class="w-full px-6 py-4 rounded-xl bg-white text-gray-900 placeholder-gray-500 font-medium text-center text-lg mb-4" required onchange="quiz.email = this.value">
                                        <button type="submit" class="w-full px-6 py-4 bg-gradient-to-r from-rose-400 to-pink-400 text-white font-bold rounded-full hover:shadow-2xl transition-all text-lg">
                                            Inviami la diagnosi completa + esercizio
                                        </button>
                                        <p class="text-xs text-rose-300/80 text-center mt-2">Non spam. Solo una email quando Il Cerchio apre 💛</p>
                                    </form>
                                </div>
                            </div>
                        </div>
                    `;
                } else if (this.submitted) {
                    const winningSchema = this.getWinningSchema();
                    const result = this.schemas[winningSchema];

                    app.innerHTML = `
                        <div class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 flex items-center justify-center p-4">
                            <div class="text-center max-w-2xl animate-slideIn">
                                <div class="mb-8 text-7xl animate-float">✨</div>
                                <h2 class="text-4xl font-bold text-white mb-4">Email inviata!</h2>
                                <div class="bg-white/10 backdrop-blur-md rounded-2xl p-8 border border-white/20 mb-8">
                                    <p class="text-purple-100 text-lg mb-4">Perfetto! Controlla la tua email tra pochi minuti 📧</p>
                                    <p class="text-purple-200 text-sm">Ti sto inviando la diagnosi COMPLETA su <span class="font-bold text-rose-300">${result.name}</span></p>
                                </div>
                                <div class="bg-gradient-to-r from-rose-400 to-pink-400 rounded-2xl p-6">
                                    <h3 class="text-white font-bold text-lg mb-4">📌 Nella tua email:</h3>
                                    <ul class="text-white space-y-2 text-left text-sm">
                                        <li>✅ La diagnosi COMPLETA personalizzata</li>
                                        <li>✅ 5 aree specifiche su cui lavorare</li>
                                        <li>✅ L'esercizio pratico DETTAGLIATO</li>
                                        <li>✅ Accesso anticipato alla comunità</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
        }

        const quiz = new Quiz();
    </script>
</body>
</html>
